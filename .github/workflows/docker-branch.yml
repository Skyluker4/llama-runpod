---
name: Build and Push Docker Image (Branch)

on:
  push:
    branches:
      - "**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/llama-runpod

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      attestations: write
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check push eligibility
        id: push
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          CAN_PUSH="true"

          # Skip push if secrets are unavailable (e.g. Dependabot)
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            CAN_PUSH="false"
          fi

          # Skip push for branch names that conflict with tag-workflow Docker tags
          if [[ "$BRANCH" == "latest" || "$BRANCH" =~ ^v[0-9]+(\.[0-9]+){0,2}$ ]]; then
            CAN_PUSH="false"
          fi

          echo "can_push=$CAN_PUSH" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        if: steps.push.outputs.can_push == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.push.outputs.can_push == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        if: steps.push.outputs.can_push == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Extract metadata
        if: steps.push.outputs.can_push == 'true'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}
            quay.io/${{ github.repository_owner }}/llama-runpod
          tags: |
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: ${{ steps.push.outputs.can_push == 'true' }}
          build-args: BUILD_JOBS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Create development release
        if: github.ref == 'refs/heads/main' && steps.push.outputs.can_push == 'true'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          generate_release_notes: true
          make_latest: false
