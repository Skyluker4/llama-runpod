---
name: Build and Push Docker Image (Tag)

on:
  push:
    tags:
      - "**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/llama-runpod

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      attestations: write
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if tag is on main branch
        id: check_main
        run: |
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Compute version aliases
        id: aliases
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAGS=""

          # Strip leading 'v' for parsing, keep it in output
          VER="${TAG#v}"
          PREFIX=""
          if [[ "$TAG" == v* ]]; then
            PREFIX="v"
          fi

          IFS='.' read -ra PARTS <<< "$VER"

          # v3.0.0 -> add v3.0 and v3
          if [[ ${#PARTS[@]} -ge 3 ]]; then
            MINOR="${PREFIX}${PARTS[0]}.${PARTS[1]}"
            MAJOR="${PREFIX}${PARTS[0]}"
            TAGS="type=raw,value=${MINOR}
          type=raw,value=${MAJOR}"
          # v3.0 -> add v3
          elif [[ ${#PARTS[@]} -ge 2 ]]; then
            MAJOR="${PREFIX}${PARTS[0]}"
            TAGS="type=raw,value=${MAJOR}"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}
            quay.io/${{ github.repository_owner }}/llama-runpod
          tags: |
            type=ref,event=tag
            ${{ steps.aliases.outputs.tags }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.check_main.outputs.on_main == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          build-args: BUILD_JOBS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Update alias git tags
        if: steps.aliases.outputs.tags != ''
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          PREFIX=""
          if [[ "$TAG" == v* ]]; then
            PREFIX="v"
          fi

          IFS='.' read -ra PARTS <<< "$VER"

          ALIAS_TAGS=()
          if [[ ${#PARTS[@]} -ge 3 ]]; then
            ALIAS_TAGS+=("${PREFIX}${PARTS[0]}.${PARTS[1]}" "${PREFIX}${PARTS[0]}")
          elif [[ ${#PARTS[@]} -ge 2 ]]; then
            ALIAS_TAGS+=("${PREFIX}${PARTS[0]}")
          fi

          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          for ALIAS in "${ALIAS_TAGS[@]}"; do
            git tag -f "$ALIAS" "${{ github.sha }}"
            git push -f "$REMOTE" "refs/tags/$ALIAS"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
